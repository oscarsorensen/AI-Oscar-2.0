<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oscar WIO</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="shell">
        <header class="hero">
          <p class="eyebrow">OSCAR WIO</p>
          <h1>Ask Oscar</h1>
          <p class="hint">Write a question in the box below and get an answer from your local Oscar notes.</p>
        </header>

        <section class="grid">
          <form id="ask-form" class="card question-card">
            <h2>Question Box</h2>
            <label for="question">Your question</label>
            <textarea
              id="question"
              name="question"
              rows="8"
              placeholder="What are Oscar's strongest study habits?"
              required
            ></textarea>
            <button id="ask-button" type="submit">Ask Oscar</button>
            <p id="status" class="status" aria-live="polite"></p>
          </form>

          <section class="card answer-card" id="result">
            <h2>Answer Box</h2>
            <pre id="answer">Your answer appears here.</pre>
            <details>
              <summary>Show matched snippets</summary>
              <ul id="matches"></ul>
            </details>
          </section>
        </section>
      </section>
    </main>

    <script>
      const form = document.getElementById("ask-form");
      const result = document.getElementById("result");
      const answer = document.getElementById("answer");
      const matches = document.getElementById("matches");
      const status = document.getElementById("status");
      const askButton = document.getElementById("ask-button");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const question = document.getElementById("question").value.trim();
        if (!question) return;

        askButton.disabled = true;
        status.textContent = "Thinking...";
        answer.textContent = "Thinking...";
        matches.innerHTML = "";
        result.classList.add("is-active");

        try {
          const res = await fetch("/api/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question })
          });

          const data = await res.json();
          if (!res.ok) {
            answer.textContent = data.error || "Error";
            status.textContent = "Request failed.";
            return;
          }

          answer.textContent = data.answer;
          status.textContent = "Done.";

          for (const row of data.matches || []) {
            const li = document.createElement("li");
            li.textContent = `${row.source}: ${row.text.slice(0, 220)}${row.text.length > 220 ? "..." : ""}`;
            matches.appendChild(li);
          }
        } catch (err) {
          answer.textContent = "Could not contact server.";
          status.textContent = "Could not contact server.";
        } finally {
          askButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
